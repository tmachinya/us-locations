spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/us_geo
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: validate   # we let Flyway create/alter schema
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.default_schema: public
      hibernate.format_sql: true
      javax:
        persistence:
          validation:
            mode: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
